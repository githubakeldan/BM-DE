name: bm-de

services:

  ollama:
    image: ollama/ollama:0.11.7
    container_name: bm-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - bm-ollama:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_NUM_PARALLEL: 2
      OLLAMA_MAX_LOADED_MODELS: 2
      OLLAMA_FLASH_ATTENTION: "1"
    networks:
      - bm-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:17
    container_name: bm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Europe/Istanbul
    ports:
      - "5432:5432"
    volumes:
      - bm-postgres:/var/lib/postgresql/data
    networks:
      - bm-network
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: bm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - bm-redis:/data
    networks:
      - bm-network
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: bm-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - bm-qdrant:/qdrant/storage
    networks:
      - bm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: bm-open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - bm-open-webui:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_SIGNUP: "false"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - bm-network

  n8n:
    image: docker.n8n.io/n8nio/n8n:1.102.4
    container_name: bm-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      GENERIC_TIMEZONE: Europe/Istanbul
    volumes:
      - bm-n8n:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bm-network

networks:
  bm-network:
    driver: bridge

volumes:
  bm-ollama:
  bm-open-webui:
  bm-postgres:
  bm-redis:
  bm-qdrant:
  bm-n8n:
